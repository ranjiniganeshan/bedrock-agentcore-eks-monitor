apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-agent
  namespace: monitoring
  labels:
    app: webhook-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-agent
  template:
    metadata:
      labels:
        app: webhook-agent
    spec:
      serviceAccountName: webhook-agent-sa
      containers:
        - name: webhook-agent
          image: ranjini/webhook-agent:bedrock
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: webhook-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-agent
  namespace: monitoring
spec:
  selector:
    app: webhook-agent
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# ServiceAccount so the agent pod can call the Kubernetes API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-agent-sa
  namespace: monitoring
---
# ClusterRole: read pods/logs/events, patch deployments for auto-fix
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: webhook-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: webhook-agent-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: webhook-agent-role
subjects:
  - kind: ServiceAccount
    name: webhook-agent-sa
    namespace: monitoring
