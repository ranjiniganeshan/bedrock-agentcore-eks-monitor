# Secret containing Alertmanager config with agent-webhook routes enabled.
# Apply in monitoring namespace. Secret name must match what kube-prometheus-stack
# expects: alertmanager-<alertmanager-cr-name>. If your Helm release is not
# "prometheus-stack", fix the secret name (e.g. alertmanager-<release>-kube-prom-alertmanager).
#
# Apply: kubectl apply -f alertmanager-secret.yaml
# Restart Alertmanager so it reloads:
#   kubectl -n monitoring rollout restart statefulset/alertmanager-prometheus-stack-kube-prom-alertmanager
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      smtp_from: erchandika@gmail.com
      smtp_hello: localhost
      smtp_smarthost: smtp.gmail.com:587
      smtp_auth_username: erchandika@gmail.com
      smtp_auth_password: "ywny uuyc duwz gbfo"
      smtp_require_tls: true

    route:
      receiver: "null"
      group_by: ["namespace"]
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 12h
      routes:
        - receiver: "ai-agent"
          matchers:
            - severity="critical"
          continue: true

    inhibit_rules:
      - source_matchers: [severity="critical"]
        target_matchers: [severity=~"warning|info"]
        equal: ["namespace", "alertname"]
      - source_matchers: [severity="warning"]
        target_matchers: [severity="info"]
        equal: ["namespace", "alertname"]
      - source_matchers: [alertname="InfoInhibitor"]
        target_matchers: [severity="info"]
        equal: ["namespace"]
      - target_matchers: [alertname="InfoInhibitor"]

    receivers:
      - name: "null"
      # - name: "email"
      #   email_configs:
      #     - to: cr.crazylearning@gmail.com
      #       from: erchandika@gmail.com
      #       hello: localhost
      #       smarthost: smtp.gmail.com:587
      #       auth_username: erchandika@gmail.com
      #       auth_password: "ywny uuyc duwz gbfo"
      #       send_resolved: true
      #       headers:
      #         Subject: '{{ template "email.default.subject" . }}'
      # - name: "n8n"
      #   webhook_configs:
      #     - url: "http://n8n.n8n.svc.cluster.local:5678/webhook/alertmanager"
      #       send_resolved: true
      - name: "ai-agent"
        webhook_configs:
          - url: "http://alertmanager-webhook-server.alertmanager-agent.svc.cluster.local/api/investigate"
            send_resolved: false

    templates:
      - /etc/alertmanager/config/*.tmpl
